name: Publish AptKit Core

on:
  workflow_dispatch:
  push:
    tags:
      - 'aptkit-core-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build:core

      - run: npm run pack:core
        env:
          APTKIT_PACK_DIR: ${{ runner.temp }}/aptkit-packs
          APTKIT_NPM_CACHE: ${{ runner.temp }}/npm-cache

      - run: npm publish "$RUNNER_TEMP/aptkit-packs/rlynjb-aptkit-core-0.3.0.tgz" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
