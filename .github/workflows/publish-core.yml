name: Publish AptKit Core

on:
  workflow_dispatch:
  push:
    tags:
      - 'aptkit-core-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@rlynjb'
          cache: npm

      - run: npm ci

      - run: npm run build --workspaces --if-present

      - run: npm run pack:core
        env:
          APTKIT_PACK_DIR: ${{ runner.temp }}/aptkit-packs
          APTKIT_NPM_CACHE: ${{ runner.temp }}/npm-cache

      - run: npm publish "$RUNNER_TEMP/aptkit-packs/rlynjb-aptkit-core-0.1.0.tgz" --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
