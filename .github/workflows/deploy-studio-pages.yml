name: Deploy Studio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build workspace dependencies
        # build:core:deps compiles the workspace packages in topological order
        # first. Without it, `npm run build --workspaces` builds packages in
        # lexical order, so packages/core compiles before its dependencies
        # (runtime, prompts, agents, …) and fails with TS2307 on a clean
        # checkout where no prior dist/*.d.ts exists.
        run: |
          npm run build:core:deps
          npm run build --workspaces --if-present

      - name: Build static Studio
        run: npm run build:pages -w @aptkit/studio

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/studio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
